syntax = "proto3";

package yfinance_grpc.v1;

import "google/protobuf/timestamp.proto";

// TickerService provides access to Yahoo Finance ticker data
service TickerService {
  // GetInfo returns general information about a ticker
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  
  // GetHistory returns historical market data for a ticker
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  
  // GetDividends returns dividend history for a ticker
  rpc GetDividends(GetDividendsRequest) returns (GetDividendsResponse);
  
  // GetSplits returns stock split history for a ticker
  rpc GetSplits(GetSplitsRequest) returns (GetSplitsResponse);
  
  // GetActions returns all corporate actions (dividends, splits, capital gains)
  rpc GetActions(GetActionsRequest) returns (GetActionsResponse);
  
  // GetFinancials returns financial statements (income statement)
  rpc GetFinancials(GetFinancialsRequest) returns (GetFinancialsResponse);
  
  // GetBalanceSheet returns balance sheet data
  rpc GetBalanceSheet(GetBalanceSheetRequest) returns (GetBalanceSheetResponse);
  
  // GetCashFlow returns cash flow statement data
  rpc GetCashFlow(GetCashFlowRequest) returns (GetCashFlowResponse);
  
  // GetEarnings returns earnings data
  rpc GetEarnings(GetEarningsRequest) returns (GetEarningsResponse);
  
  // GetRecommendations returns analyst recommendations
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
  
  // GetOptions returns available option expiration dates
  rpc GetOptions(GetOptionsRequest) returns (GetOptionsResponse);
  
  // GetOptionChain returns option chain data for a specific expiration date
  rpc GetOptionChain(GetOptionChainRequest) returns (GetOptionChainResponse);
  
  // GetCalendar returns upcoming events, earnings, and dividends
  rpc GetCalendar(GetCalendarRequest) returns (GetCalendarResponse);
  
  // GetNews returns recent news articles for a ticker
  rpc GetNews(GetNewsRequest) returns (GetNewsResponse);
  
  // GetMajorHolders returns major holders information
  rpc GetMajorHolders(GetMajorHoldersRequest) returns (GetMajorHoldersResponse);
  
  // GetInstitutionalHolders returns institutional holders information
  rpc GetInstitutionalHolders(GetInstitutionalHoldersRequest) returns (GetInstitutionalHoldersResponse);
  
  // GetMutualFundHolders returns mutual fund holders information
  rpc GetMutualFundHolders(GetMutualFundHoldersRequest) returns (GetMutualFundHoldersResponse);
  
  // GetMultipleInfo returns information for multiple tickers at once
  rpc GetMultipleInfo(GetMultipleInfoRequest) returns (GetMultipleInfoResponse);
  
  // DownloadHistory streams historical data for multiple tickers
  rpc DownloadHistory(DownloadHistoryRequest) returns (stream DownloadHistoryResponse);

  // GetCapitalGains returns capital gains distributions for a ticker
  rpc GetCapitalGains(GetCapitalGainsRequest) returns (GetCapitalGainsResponse);

  // GetSharesHistory returns the full history of shares outstanding
  rpc GetSharesHistory(GetSharesHistoryRequest) returns (GetSharesHistoryResponse);

  // GetIsin returns the ISIN code for a ticker
  rpc GetIsin(GetIsinRequest) returns (GetIsinResponse);

  // GetFastInfo returns a lightweight snapshot of key price/market data
  rpc GetFastInfo(GetFastInfoRequest) returns (GetFastInfoResponse);

  // GetSustainability returns ESG scores and controversy flags
  rpc GetSustainability(GetSustainabilityRequest) returns (GetSustainabilityResponse);

  // GetInsiderPurchases returns a summary table of insider buying/selling activity
  rpc GetInsiderPurchases(GetInsiderPurchasesRequest) returns (GetInsiderPurchasesResponse);

  // GetInsiderTransactions returns individual insider transaction records
  rpc GetInsiderTransactions(GetInsiderTransactionsRequest) returns (GetInsiderTransactionsResponse);

  // GetInsiderRosterHolders returns the roster of insider holders
  rpc GetInsiderRosterHolders(GetInsiderRosterHoldersRequest) returns (GetInsiderRosterHoldersResponse);

  // GetAnalystPriceTargets returns the consensus analyst price target
  rpc GetAnalystPriceTargets(GetAnalystPriceTargetsRequest) returns (GetAnalystPriceTargetsResponse);

  // GetRecommendationsSummary returns period-based aggregated analyst recommendation counts
  rpc GetRecommendationsSummary(GetRecommendationsSummaryRequest) returns (GetRecommendationsSummaryResponse);

  // GetEarningsEstimate returns forward EPS estimates by period
  rpc GetEarningsEstimate(GetEarningsEstimateRequest) returns (GetEarningsEstimateResponse);

  // GetRevenueEstimate returns forward revenue estimates by period
  rpc GetRevenueEstimate(GetRevenueEstimateRequest) returns (GetRevenueEstimateResponse);

  // GetEarningsHistory returns historical EPS actuals vs estimates
  rpc GetEarningsHistory(GetEarningsHistoryRequest) returns (GetEarningsHistoryResponse);

  // GetEpsTrend returns the EPS estimate trend across recent revision windows
  rpc GetEpsTrend(GetEpsTrendRequest) returns (GetEpsTrendResponse);

  // GetEpsRevisions returns counts of upward/downward EPS revisions
  rpc GetEpsRevisions(GetEpsRevisionsRequest) returns (GetEpsRevisionsResponse);

  // GetGrowthEstimates returns growth estimates for the stock, industry, sector and index
  rpc GetGrowthEstimates(GetGrowthEstimatesRequest) returns (GetGrowthEstimatesResponse);

  // GetEarningsDates returns upcoming and past earnings dates with EPS data
  rpc GetEarningsDates(GetEarningsDatesRequest) returns (GetEarningsDatesResponse);

  // GetHistoryMetadata returns exchange and instrument metadata for a ticker
  rpc GetHistoryMetadata(GetHistoryMetadataRequest) returns (GetHistoryMetadataResponse);

  // GetSecFilings returns SEC filings for a ticker
  rpc GetSecFilings(GetSecFilingsRequest) returns (GetSecFilingsResponse);
}

// ========== GetInfo ==========

message GetInfoRequest {
  string ticker = 1; // Ticker symbol (e.g., "AAPL")
}

message GetInfoResponse {
  TickerInfo info = 1;
}

message TickerInfo {
  // Company Information
  string symbol = 1;
  string short_name = 2;
  string long_name = 3;
  string industry = 4;
  string sector = 5;
  string country = 6;
  string city = 7;
  string state = 8;
  string zip = 9;
  string website = 10;
  string long_business_summary = 11;
  
  // Trading Information
  double previous_close = 20;
  double open = 21;
  double day_low = 22;
  double day_high = 23;
  double regular_market_previous_close = 24;
  double regular_market_open = 25;
  double regular_market_day_low = 26;
  double regular_market_day_high = 27;
  double current_price = 28;
  
  // Volume and Shares
  int64 volume = 30;
  int64 regular_market_volume = 31;
  int64 average_volume = 32;
  int64 average_volume_10days = 33;
  int64 shares_outstanding = 34;
  int64 float_shares = 35;
  
  // Market Cap and Valuation
  int64 market_cap = 40;
  double enterprise_value = 41;
  double trailing_pe = 42;
  double forward_pe = 43;
  double price_to_book = 44;
  double price_to_sales_trailing_12months = 45;
  double enterprise_to_revenue = 46;
  double enterprise_to_ebitda = 47;
  
  // Dividends and Yield
  double dividend_rate = 50;
  double dividend_yield = 51;
  int64 ex_dividend_date = 52; // Unix timestamp
  double payout_ratio = 53;
  double five_year_avg_dividend_yield = 54;
  
  // Financial Metrics
  double beta = 60;
  double trailing_eps = 61;
  double forward_eps = 62;
  double book_value = 63;
  double profit_margins = 64;
  double revenue_per_share = 65;
  double return_on_assets = 66;
  double return_on_equity = 67;
  double revenue_growth = 68;
  double earnings_growth = 69;
  double operating_margins = 70;
  double ebitda_margins = 71;
  
  // 52 Week Range
  double fifty_two_week_low = 80;
  double fifty_two_week_high = 81;
  double fifty_day_average = 82;
  double two_hundred_day_average = 83;
  
  // Targets and Estimates
  double target_high_price = 90;
  double target_low_price = 91;
  double target_mean_price = 92;
  double target_median_price = 93;
  int32 number_of_analyst_opinions = 94;
  
  // Other
  string currency = 100;
  string exchange = 101;
  string quote_type = 102; // EQUITY, ETF, MUTUALFUND, etc.
  string financial_currency = 103;
  int32 price_hint = 104;
}

// ========== GetHistory ==========

message GetHistoryRequest {
  string ticker = 1; // Ticker symbol (e.g., "AAPL")
  
  // Period or date range (use one or the other)
  optional string period = 2; // e.g., "1d", "5d", "1mo", "3mo", "6mo", "1y", "2y", "5y", "10y", "ytd", "max"
  optional google.protobuf.Timestamp start = 3; // Start date
  optional google.protobuf.Timestamp end = 4; // End date
  
  // Interval for data points
  string interval = 5; // "1m", "2m", "5m", "15m", "30m", "60m", "90m", "1h", "1d", "5d", "1wk", "1mo", "3mo"
  
  // Options
  optional bool prepost = 6; // Include pre and post market data (default: false)
  optional bool actions = 7; // Include dividends and stock splits (default: true)
  optional bool auto_adjust = 8; // Adjust all OHLC automatically (default: true)
  optional bool back_adjust = 9; // Back-adjust data to account for splits (default: false)
  optional bool repair = 10; // Detect and repair bad data (default: false)
  optional bool keepna = 11; // Keep NaN values (default: false)
  optional bool rounding = 12; // Round values (default: false)
}

message GetHistoryResponse {
  repeated HistoryRow rows = 1;
}

message HistoryRow {
  google.protobuf.Timestamp date = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 volume = 6;
  optional double dividends = 7;
  optional double stock_splits = 8;
  optional double capital_gains = 9;
}

// ========== GetDividends ==========

message GetDividendsRequest {
  string ticker = 1;
  optional string period = 2; // e.g., "1y", "5y", "max" (default: "max")
}

message GetDividendsResponse {
  repeated DividendRow rows = 1;
}

message DividendRow {
  google.protobuf.Timestamp date = 1;
  double amount = 2;
}

// ========== GetSplits ==========

message GetSplitsRequest {
  string ticker = 1;
  optional string period = 2; // e.g., "1y", "5y", "max" (default: "max")
}

message GetSplitsResponse {
  repeated SplitRow rows = 1;
}

message SplitRow {
  google.protobuf.Timestamp date = 1;
  double ratio = 2; // e.g., 2.0 for a 2-for-1 split
}

// ========== GetActions ==========

message GetActionsRequest {
  string ticker = 1;
  optional string period = 2; // e.g., "1y", "5y", "max" (default: "max")
}

message GetActionsResponse {
  repeated ActionRow rows = 1;
}

message ActionRow {
  google.protobuf.Timestamp date = 1;
  optional double dividends = 2;
  optional double stock_splits = 3;
  optional double capital_gains = 4;
}

// ========== GetFinancials ==========

message GetFinancialsRequest {
  string ticker = 1;
  string freq = 2; // "yearly", "quarterly", or "trailing" (default: "yearly")
  bool as_dict = 3; // Return as dictionary format
  bool pretty = 4; // Format row names nicely for readability
}

message GetFinancialsResponse {
  repeated FinancialStatement statements = 1;
}

message FinancialStatement {
  google.protobuf.Timestamp date = 1;
  map<string, double> values = 2; // Key: metric name, Value: amount
}

// ========== GetBalanceSheet ==========

message GetBalanceSheetRequest {
  string ticker = 1;
  string freq = 2; // "yearly" or "quarterly" (default: "yearly")
  bool as_dict = 3;
  bool pretty = 4;
}

message GetBalanceSheetResponse {
  repeated BalanceSheetStatement statements = 1;
}

message BalanceSheetStatement {
  google.protobuf.Timestamp date = 1;
  map<string, double> values = 2;
}

// ========== GetCashFlow ==========

message GetCashFlowRequest {
  string ticker = 1;
  string freq = 2; // "yearly" or "quarterly" (default: "yearly")
  bool as_dict = 3;
  bool pretty = 4;
}

message GetCashFlowResponse {
  repeated CashFlowStatement statements = 1;
}

message CashFlowStatement {
  google.protobuf.Timestamp date = 1;
  map<string, double> values = 2;
}

// ========== GetEarnings ==========

message GetEarningsRequest {
  string ticker = 1;
  string freq = 2; // "yearly", "quarterly", or "trailing" (default: "yearly")
  bool as_dict = 3;
}

message GetEarningsResponse {
  repeated EarningsRow rows = 1;
}

message EarningsRow {
  google.protobuf.Timestamp date = 1;
  optional double revenue = 2;
  optional double earnings = 3;
}

// ========== GetRecommendations ==========

message GetRecommendationsRequest {
  string ticker = 1;
}

message GetRecommendationsResponse {
  repeated RecommendationRow rows = 1;
}

message RecommendationRow {
  google.protobuf.Timestamp date = 1;
  string firm = 2;
  string to_grade = 3;
  string from_grade = 4;
  string action = 5; // "up", "down", "main", "init"
}

// ========== GetOptions ==========

message GetOptionsRequest {
  string ticker = 1;
}

message GetOptionsResponse {
  repeated string expiration_dates = 1; // List of available expiration dates (YYYY-MM-DD format)
}

// ========== GetOptionChain ==========

message GetOptionChainRequest {
  string ticker = 1;
  optional string date = 2; // Expiration date (YYYY-MM-DD format)
  optional string tz = 3; // Timezone
}

message GetOptionChainResponse {
  repeated OptionContract calls = 1;
  repeated OptionContract puts = 2;
}

message OptionContract {
  string contract_symbol = 1;
  double strike = 2;
  string currency = 3;
  double last_price = 4;
  double bid = 5;
  double ask = 6;
  double change = 7;
  double percent_change = 8;
  int64 volume = 9;
  int64 open_interest = 10;
  double implied_volatility = 11;
  bool in_the_money = 12;
  string contract_size = 13;
  google.protobuf.Timestamp last_trade_date = 14;
}

// ========== GetCalendar ==========

message GetCalendarRequest {
  string ticker = 1;
}

message GetCalendarResponse {
  optional EarningsDate earnings = 1;
  optional DividendDate ex_dividend_date = 2;
  repeated CalendarEvent events = 3;
}

message EarningsDate {
  optional google.protobuf.Timestamp start = 1;
  optional google.protobuf.Timestamp end = 2;
}

message DividendDate {
  optional google.protobuf.Timestamp date = 1;
}

message CalendarEvent {
  string event_type = 1;
  google.protobuf.Timestamp date = 2;
  string description = 3;
}

// ========== GetNews ==========

message GetNewsRequest {
  string ticker = 1;
  int32 count = 2; // Number of news items to return (default: 10)
}

message GetNewsResponse {
  repeated NewsArticle articles = 1;
}

message NewsArticle {
  string uuid = 1;
  string title = 2;
  string publisher = 3;
  string link = 4;
  google.protobuf.Timestamp provider_publish_time = 5;
  string type = 6;
  optional string thumbnail = 7;
  repeated string related_tickers = 8;
}

// ========== GetMajorHolders ==========

message GetMajorHoldersRequest {
  string ticker = 1;
}

message GetMajorHoldersResponse {
  map<string, string> holders = 1; // Key: description, Value: percentage/value
}

// ========== GetInstitutionalHolders ==========

message GetInstitutionalHoldersRequest {
  string ticker = 1;
}

message GetInstitutionalHoldersResponse {
  repeated InstitutionalHolder holders = 1;
}

message InstitutionalHolder {
  string holder = 1;
  int64 shares = 2;
  google.protobuf.Timestamp date_reported = 3;
  double pct_out = 4; // Percentage of shares outstanding
  double value = 5;
}

// ========== GetMutualFundHolders ==========

message GetMutualFundHoldersRequest {
  string ticker = 1;
}

message GetMutualFundHoldersResponse {
  repeated MutualFundHolder holders = 1;
}

message MutualFundHolder {
  string holder = 1;
  int64 shares = 2;
  google.protobuf.Timestamp date_reported = 3;
  double pct_out = 4;
  double value = 5;
}

// ========== GetMultipleInfo ==========

message GetMultipleInfoRequest {
  repeated string tickers = 1; // List of ticker symbols (e.g., ["AAPL", "MSFT", "GOOGL"])
}

message GetMultipleInfoResponse {
  map<string, TickerInfo> info = 1; // Map of ticker symbol to info
}

// ========== DownloadHistory ==========

message DownloadHistoryRequest {
  repeated string tickers = 1; // List of ticker symbols to download
  optional string period = 2; // Period (e.g., "1d", "5d", "1mo", "3mo", "1y")
  optional string interval = 3; // Interval (e.g., "1d", "1h", "5m")
  optional google.protobuf.Timestamp start = 4; // Start date (optional)
  optional google.protobuf.Timestamp end = 5; // End date (optional)
  optional bool auto_adjust = 6; // Auto adjust prices (default: true)
}

message DownloadHistoryResponse {
  string ticker = 1; // Which ticker this data is for
  repeated HistoryRow rows = 2; // Historical data rows
}

// ========== GetCapitalGains ==========

message GetCapitalGainsRequest {
  string ticker = 1;
  optional string period = 2; // e.g., "1y", "5y", "max" (default: "max")
}

message GetCapitalGainsResponse {
  repeated CapitalGainsRow rows = 1;
}

message CapitalGainsRow {
  google.protobuf.Timestamp date = 1;
  double amount = 2;
}

// ========== GetSharesHistory ==========

message GetSharesHistoryRequest {
  string ticker = 1;
  optional google.protobuf.Timestamp start = 2;
  optional google.protobuf.Timestamp end = 3;
}

message GetSharesHistoryResponse {
  repeated SharesHistoryRow rows = 1;
}

message SharesHistoryRow {
  google.protobuf.Timestamp date = 1;
  int64 shares = 2;
}

// ========== GetIsin ==========

message GetIsinRequest {
  string ticker = 1;
}

message GetIsinResponse {
  string isin = 1;
}

// ========== GetFastInfo ==========

message GetFastInfoRequest {
  string ticker = 1;
}

message GetFastInfoResponse {
  FastInfo info = 1;
}

message FastInfo {
  string currency = 1;
  string exchange = 2;
  int32 exchange_data_delayed_by = 3;
  string exchange_timezone_name = 4;
  double last_price = 5;
  int64 last_volume = 6;
  int64 market_cap = 7;
  double open = 8;
  double previous_close = 9;
  string quote_type = 10;
  double regular_market_day_high = 11;
  double regular_market_day_low = 12;
  double regular_market_previous_close = 13;
  double regular_market_price = 14;
  int64 shares = 15;
  double three_month_average_volume = 16;
  string timezone = 17;
  double fifty_day_average = 18;
  double two_hundred_day_average = 19;
  double year_change = 20;
  double year_high = 21;
  double year_low = 22;
}

// ========== GetSustainability ==========

message GetSustainabilityRequest {
  string ticker = 1;
}

message GetSustainabilityResponse {
  double total_esg = 1;
  string esg_performance = 2; // e.g., "AVG_PERF", "OUT_PERF", "UNDER_PERF"
  double environment_score = 3;
  double social_score = 4;
  double governance_score = 5;
  double percentile = 6;
  string peer_group = 7;
  // Controversy flags
  bool adult = 20;
  bool alcoholic = 21;
  bool animal_testing = 22;
  bool catholic = 23;
  bool controversial_weapons = 24;
  bool small_arms = 25;
  bool fur_leather = 26;
  bool gambling = 27;
  bool gmo = 28;
  bool military_contract = 29;
  bool nuclear = 30;
  bool pesticides = 31;
  bool palm_oil = 32;
  bool coal = 33;
  bool tobacco = 34;
}

// ========== GetInsiderPurchases ==========

message GetInsiderPurchasesRequest {
  string ticker = 1;
}

message GetInsiderPurchasesResponse {
  repeated InsiderPurchaseSummaryRow rows = 1;
}

// Each row corresponds to one label (e.g., "Purchases", "Sales") with a map of column values
message InsiderPurchaseSummaryRow {
  string label = 1;
  map<string, string> values = 2;
}

// ========== GetInsiderTransactions ==========

message GetInsiderTransactionsRequest {
  string ticker = 1;
}

message GetInsiderTransactionsResponse {
  repeated InsiderTransaction transactions = 1;
}

message InsiderTransaction {
  google.protobuf.Timestamp start_date = 1;
  string insider = 2;
  string position = 3;
  string transaction = 4;
  int64 shares = 5;
  double value = 6;
  string text = 7;
  string url = 8;
}

// ========== GetInsiderRosterHolders ==========

message GetInsiderRosterHoldersRequest {
  string ticker = 1;
}

message GetInsiderRosterHoldersResponse {
  repeated InsiderRosterHolder holders = 1;
}

message InsiderRosterHolder {
  string name = 1;
  string position = 2;
  string url = 3;
  google.protobuf.Timestamp most_recent_transaction = 4;
  int64 latest_transaction_shares = 5;
}

// ========== GetAnalystPriceTargets ==========

message GetAnalystPriceTargetsRequest {
  string ticker = 1;
}

message GetAnalystPriceTargetsResponse {
  double current = 1;
  double low = 2;
  double high = 3;
  double mean = 4;
  double median = 5;
}

// ========== GetRecommendationsSummary ==========

// Period-based aggregated counts (distinct from GetRecommendations which returns individual upgrades/downgrades)
message GetRecommendationsSummaryRequest {
  string ticker = 1;
}

message GetRecommendationsSummaryResponse {
  repeated RecommendationSummaryRow rows = 1;
}

message RecommendationSummaryRow {
  string period = 1; // e.g., "0m", "-1m", "-2m"
  int32 strong_buy = 2;
  int32 buy = 3;
  int32 hold = 4;
  int32 sell = 5;
  int32 strong_sell = 6;
}

// ========== GetEarningsEstimate ==========

message GetEarningsEstimateRequest {
  string ticker = 1;
}

message GetEarningsEstimateResponse {
  repeated EarningsEstimateRow rows = 1;
}

message EarningsEstimateRow {
  string period = 1; // "0q", "+1q", "0y", "+1y"
  int32 number_of_analysts = 2;
  double avg = 3;
  double low = 4;
  double high = 5;
  double year_ago_eps = 6;
  double growth = 7;
}

// ========== GetRevenueEstimate ==========

message GetRevenueEstimateRequest {
  string ticker = 1;
}

message GetRevenueEstimateResponse {
  repeated RevenueEstimateRow rows = 1;
}

message RevenueEstimateRow {
  string period = 1; // "0q", "+1q", "0y", "+1y"
  int32 number_of_analysts = 2;
  double avg = 3;
  double low = 4;
  double high = 5;
  double year_ago_revenue = 6;
  double growth = 7;
}

// ========== GetEarningsHistory ==========

message GetEarningsHistoryRequest {
  string ticker = 1;
}

message GetEarningsHistoryResponse {
  repeated EarningsHistoryRow rows = 1;
}

message EarningsHistoryRow {
  google.protobuf.Timestamp date = 1;
  double eps_estimate = 2;
  double eps_actual = 3;
  double eps_difference = 4;
  double surprise_percent = 5;
}

// ========== GetEpsTrend ==========

message GetEpsTrendRequest {
  string ticker = 1;
}

message GetEpsTrendResponse {
  repeated EpsTrendRow rows = 1;
}

message EpsTrendRow {
  string period = 1; // "0q", "+1q", "0y", "+1y"
  double current = 2;
  double seven_days_ago = 3;
  double thirty_days_ago = 4;
  double sixty_days_ago = 5;
  double ninety_days_ago = 6;
}

// ========== GetEpsRevisions ==========

message GetEpsRevisionsRequest {
  string ticker = 1;
}

message GetEpsRevisionsResponse {
  repeated EpsRevisionsRow rows = 1;
}

message EpsRevisionsRow {
  string period = 1; // "0q", "+1q", "0y", "+1y"
  int32 up_last_7days = 2;
  int32 up_last_30days = 3;
  int32 down_last_7days = 4;
  int32 down_last_30days = 5;
}

// ========== GetGrowthEstimates ==========

message GetGrowthEstimatesRequest {
  string ticker = 1;
}

message GetGrowthEstimatesResponse {
  repeated GrowthEstimatesRow rows = 1;
}

message GrowthEstimatesRow {
  string period = 1; // "0q", "+1q", "0y", "+1y", "+5y", "-5y"
  double stock = 2;
  double industry = 3;
  double sector = 4;
  double index = 5;
}

// ========== GetEarningsDates ==========

message GetEarningsDatesRequest {
  string ticker = 1;
  optional int32 limit = 2; // Number of dates to return (default: 12)
}

message GetEarningsDatesResponse {
  repeated EarningsDateRow rows = 1;
}

message EarningsDateRow {
  google.protobuf.Timestamp date = 1;
  optional double eps_estimate = 2;
  optional double reported_eps = 3;
  optional double surprise_pct = 4;
}

// ========== GetHistoryMetadata ==========

message GetHistoryMetadataRequest {
  string ticker = 1;
}

message GetHistoryMetadataResponse {
  string currency = 1;
  string symbol = 2;
  string exchange_name = 3;
  string full_exchange_name = 4;
  string instrument_type = 5;
  int64 first_trade_date = 6; // Unix timestamp
  int64 regular_market_time = 7; // Unix timestamp
  bool has_pre_post_market_data = 8;
  int32 gmt_offset = 9;
  string timezone = 10;
  string exchange_timezone_name = 11;
  double regular_market_price = 12;
  double fifty_two_week_high = 13;
  double fifty_two_week_low = 14;
  string data_granularity = 15;
  string range = 16;
  repeated string valid_ranges = 17;
}

// ========== GetSecFilings ==========

message GetSecFilingsRequest {
  string ticker = 1;
}

message GetSecFilingsResponse {
  repeated SecFiling filings = 1;
}

message SecFiling {
  google.protobuf.Timestamp date = 1;
  string type = 2;
  string title = 3;
  string url = 4;
}
