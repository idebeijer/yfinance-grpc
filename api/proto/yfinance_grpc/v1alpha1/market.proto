syntax = "proto3";

package yfinance_grpc.v1alpha1;

import "google/protobuf/timestamp.proto";

// MarketService provides market-level trading status and price summaries.
service MarketService {
  // GetMarketStatus returns the current open/close status and session times for a market.
  rpc GetMarketStatus(GetMarketStatusRequest) returns (GetMarketStatusResponse);

  // GetMarketSummary returns a price summary of major instruments in a market.
  rpc GetMarketSummary(GetMarketSummaryRequest) returns (GetMarketSummaryResponse);
}

// ========== GetMarketStatus ==========

message GetMarketStatusRequest {
  // Yahoo Finance market identifier, e.g. "us_market", "gb_market", "jp_market".
  string market = 1;
}

message MarketStatus {
  // Session type, e.g. "REGULAR", "PRE", "POST".
  string market_type = 1;
  google.protobuf.Timestamp open = 2;
  google.protobuf.Timestamp close = 3;
  // Short timezone label, e.g. "EST".
  string timezone_short = 4;
  // GMT offset in milliseconds.
  int32 timezone_gmtoffset = 5;
}

message GetMarketStatusResponse {
  MarketStatus status = 1;
}

// ========== GetMarketSummary ==========

message GetMarketSummaryRequest {
  // Yahoo Finance market identifier, e.g. "us_market".
  string market = 1;
}

message MarketSummaryItem {
  string short_name = 1;
  double regular_market_price = 2;
  double regular_market_change = 3;
  double regular_market_change_percent = 4;
}

message GetMarketSummaryResponse {
  // Keyed by exchange symbol (e.g. "^GSPC", "^DJI").
  map<string, MarketSummaryItem> summary = 1;
}
